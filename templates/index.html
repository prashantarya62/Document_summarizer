<!DOCTYPE html>
<html>

<head>

    <title>AI Document Summarizer</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>

<body class="container mt-5">

    <h1 class="mb-4">
        AI Document Summaries
    </h1>

    <div class="mb-3">

        <a
            href="/download/csv"
            class="btn btn-success"
        >
            Download CSV
        </a>

        <a
            href="/download/pdf"
            class="btn btn-danger"
        >
            Download PDF
        </a>

    </div>

    <table class="table table-bordered table-striped">

        <thead class="table-dark">

            <tr>
                <th>File Name</th>
                <th>Summary</th>
                <th>Drive Link</th>
            </tr>

        </thead>

        <tbody>

            {% for item in results %}

            <tr>

                <td>
                    {{ item.file_name }}
                </td>

                <td>
                    {{ item.summary }}
                </td>

                <td>

                    <a
                        href="{{ item.link }}"
                        target="_blank"
                    >
                        Open File
                    </a>

                </td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

</body>

</html>
